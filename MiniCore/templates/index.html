<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Comisiones</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
        }

        main {
            display: flex;
            justify-content: center;
            margin-top: 80px;
        }

        section {
            background: white;
            padding: 30px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        nav a {
            display: block;
            margin: 10px;
            padding: 10px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
        }

        .btn1 { background: #28a745; }
        .btn2 { background: #17a2b8; }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<header>
    <h1>Sistema de Comisiones</h1>
</header>

<main>
    <section>
        <h2>Menú</h2>

        <nav>
            <a href="/nueva_venta" class="btn1">Registrar Venta</a>
            <a href="/resultado" class="btn2">Ver Comisiones</a>
        </nav>
    </section>
</main>

<footer>
    <p>Proyecto Flask MVC</p>
</footer>

</body>
</html>
